name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Trigger Render Deployment
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
          else
            echo "RENDER_DEPLOY_HOOK not set - skipping Render deployment"
            echo "Set this in GitHub Settings → Secrets and variables → Actions"
          fi
